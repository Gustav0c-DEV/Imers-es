<!-- Declaração do tipo de documento HTML5 -->
<!DOCTYPE html>
<!-- Elemento raiz da página, com idioma português brasileiro -->
<html lang="pt-br">
<head>
  <!-- Define a codificação de caracteres como UTF-8 -->
  <meta charset="UTF-8">
  <!-- Configura a viewport para dispositivos móveis -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Título da página que aparece na aba do navegador -->
  <title>Alura Frontend</title>
  <!-- Link para o arquivo de estilos CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Conteúdo principal da página -->
  <main>
    <!-- Cabeçalho da seção principal -->
    <header>
      <!-- Botão para alternar entre dark mode e light mode -->
      <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema escuro/claro" title="Alternar tema">
        <span class="theme-icon">🌙</span>
      </button>
      <!-- Título principal da página -->
      <h1>Quem está assistindo?</h1>
    </header>
    <!-- Seção que contém a lista de usuários -->
    <section class="lista-usuarios">
      <!-- Lista não ordenada dos usuários -->
      <ul>
        <!-- Primeiro usuário -->
        <li class="usuario">
          <!-- Container semântico para imagem e legenda -->
          <figure>
            <!-- Imagem do perfil do usuário -->
            <img src="/assets/ator 1.png" alt="robert downey jr">
            <!-- Nome do usuário -->
            <figcaption>Gustavo</figcaption>
          </figure>
        </li>
        <!-- Segundo usuário -->
        <li class="usuario">
          <figure>
            <img src="/assets/ator 2.png" alt="Idris Elba">
            <figcaption>Maria</figcaption>
          </figure>
        </li>
        <!-- Terceiro usuário -->
        <li class="usuario">
          <figure>
            <img src="/assets/ator 3.png" alt="Charlize Theron">
            <figcaption>João</figcaption>
          </figure>
        </li>
        <!-- Quarto usuário -->
        <li class="usuario">
          <figure>
            <img src="/assets/ator 4.png" alt="Tilda Swinton">
            <figcaption>Ana</figcaption>
          </figure>
        </li>
      </ul>
    </section>
  </main>

  <!-- Script para gerenciar o tema dark/light mode -->
  <script src="script.js"></script>
  <script src="JS/index.js"></script>
</body>
</html>
